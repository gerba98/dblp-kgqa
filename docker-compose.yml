name: masters-thesis
services:
  app:
    image: masters-thesis/app:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: prod
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    ports:
      - "8501:8501"
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./data:/app/data
      - ./config:/app/config
  neo4j:
    image: neo4j:5.26
    user: "${USER_UID:-1000}:${USER_GID:-1000}"
    ports:
      - "7699:7474"
      - "7689:7687"
    environment:
      NEO4JLABS_PLUGINS: '["apoc", "n10s"]'
      NEO4J_AUTH: none
      NEO4J_apoc_import_file_enabled: "true"
    healthcheck:
      test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7474 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - ./data:/var/lib/neo4j/import/data
      - neo4j-data:/data
      - neo4j-logs:/logs
    restart: unless-stopped
volumes:
  neo4j-data: {}
  neo4j-logs: {}
