name: llama-server
services:
  llama-server-cpu:
    image: ghcr.io/ggml-org/llama.cpp:server
    profiles: [cpu]
    networks:
      default:
        aliases: [llama-server]
    ports:
      - "8080:8080"
    volumes:
      - hf-cache:/root/.cache/llama.cpp
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        /app/llama-server
        --hf-repo $${LLAMA_HF_REPO} --hf-file $${LLAMA_HF_FILE}
        --host 0.0.0.0 --port 8080
        --ctx-size $${LLAMA_CTX_SIZE}
        --n-gpu-layers 0
        --cache-type-k bf16 --cache-type-v bf16
    restart: unless-stopped
  llama-server-gpu:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    profiles: [gpu]
    networks:
      default:
        aliases: [llama-server]
    ports:
      - "8080:8080"
    volumes:
      - hf-cache:/root/.cache/llama.cpp
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        /app/llama-server
        --hf-repo $${LLAMA_HF_REPO} --hf-file $${LLAMA_HF_FILE}
        --host 0.0.0.0 --port 8080
        --ctx-size $${LLAMA_CTX_SIZE}
        --n-gpu-layers $${LLAMA_N_GPU_LAYERS:-99}
        --cache-type-k bf16 --cache-type-v bf16
    restart: unless-stopped
volumes:
  hf-cache: {}
networks:
  default:
    name: masters-thesis_default
    external: true
